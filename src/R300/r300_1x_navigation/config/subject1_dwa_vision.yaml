# Vision-only obstacle avoidance: stable baseline for S-shape diagnosis.
# Start conservatively; increase speed only after the ideal web simulation and
# real odometry/actuator tests are both stable.
DWAPlannerROS:
  odom_topic: /subject1/dwa_odom

  # Differential-drive R300: forward only, no lateral command.
  max_vel_x: 0.60
  min_vel_x: 0.00
  max_vel_y: 0.00
  min_vel_y: 0.00
  max_vel_trans: 0.60
  min_vel_trans: 0.00

  # Small angular corrections are allowed.  Keep the upper limit conservative
  # so a small pose error cannot produce an aggressive counter-steer.
  max_vel_theta: 0.28
  min_vel_theta: 0.00

  # These must be close to what the real chassis can execute.  The old 6 m/s^2
  # value made DWA assume unrealistically fast acceleration and braking.
  acc_lim_x: 0.80
  acc_lim_y: 0.00
  acc_lim_theta: 0.60

  xy_goal_tolerance: 0.30
  yaw_goal_tolerance: 3.14
  latch_xy_goal_tolerance: true

  sim_time: 1.80
  sim_granularity: 0.05
  angular_sim_granularity: 0.025

  vx_samples: 10
  vy_samples: 1
  vth_samples: 30

  # Prefer a smooth global-path following trend, but leave enough freedom for
  # visual-obstacle avoidance.
  path_distance_bias: 32.0
  goal_distance_bias: 8.0
  occdist_scale: 0.12

  forward_point_distance: 0.25
  stop_time_buffer: 0.80

  scaling_speed: 0.35
  max_scaling_factor: 0.20

  oscillation_reset_dist: 0.20
  oscillation_reset_angle: 0.20
  twirling_scale: 0.0
  prune_plan: true

  # The web tuner uses Path and costmap topics, not these heavy point clouds.
  publish_traj_pc: false
  publish_cost_grid_pc: false
