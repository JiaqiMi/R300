DWAPlannerROS:
  odom_topic: /subject1/dwa_odom

  # ---------------- 速度限制 ----------------
  # 1.5 m/s是最高速度，不是强制恒速。
  max_vel_x: 2.50
  min_vel_x: 0.00
  # min_vel_x: -0.15
  # penalize_negative_x: false

  max_vel_y: 0.00
  min_vel_y: 0.00

  # 差速车vy=0，因此与max_vel_x保持一致。
  max_vel_trans: 2.50
  min_vel_trans: 0.05

  # 高速时不宜过大的角速度，否则容易出现S形。
  max_vel_theta: 0.40
  min_vel_theta: 0.08

  # ---------------- 加速度限制 ----------------
  # 必须尽量接近底盘真实能力。
  # 不再使用原来的6.0 m/s²。
  acc_lim_x: 1.00
  acc_lim_y: 0.00
  acc_lim_theta: 0.60

  # ---------------- 到点条件 ----------------
  xy_goal_tolerance: 0.50
  yaw_goal_tolerance: 3.14
  latch_xy_goal_tolerance: true

  # ---------------- 轨迹预测 ----------------
  # 1.5m/s × 2.5s = 3.75m的理论预测距离。
  sim_time: 2.50
  sim_granularity: 0.05
  angular_sim_granularity: 0.025

  # 12×40=480组速度采样，兼顾精度和计算量。
  vx_samples: 12
  vy_samples: 1
  vth_samples: 51

  # ---------------- 轨迹评分 ----------------
  # 比原来的32:8更允许局部绕开障碍。
  path_distance_bias: 10.0
  goal_distance_bias: 22.0
  occdist_scale: 0.18

  # 避免过大的车头对齐项造成反复纠偏。
  forward_point_distance: 0.00

  # 高速状态保留一定停车预测余量。
  stop_time_buffer: 0.60

  # 高速经过障碍附近时扩大车辆代价。
  scaling_speed: 1.20
  max_scaling_factor: 0.35

  oscillation_reset_dist: 0.25
  oscillation_reset_angle: 0.35

  prune_plan: false
  twirling_scale: 0.0

  publish_traj_pc: false
  publish_cost_grid_pc: false