# # Conservative first-stage parameters for camera-only local obstacle avoidance.
# # Raise speed only after validating detection latency, braking distance and TF.
# DWAPlannerROS:
#   odom_topic: /one_x/odom

#   max_vel_x: 1.00
#   min_vel_x: 0.00
#   max_vel_y: 0.00
#   min_vel_y: 0.00
#   max_vel_trans: 1.00
#   min_vel_trans: 0.00

#   max_vel_theta: 0.4
#   min_vel_theta: 0.05

#   acc_lim_x: 1.00
#   acc_lim_y: 0.00
#   acc_lim_theta: 1.50

#   xy_goal_tolerance: 0.30
#   yaw_goal_tolerance: 3.14
#   latch_xy_goal_tolerance: true

#   sim_time: 1.50
#   sim_granularity: 0.05
#   angular_sim_granularity: 0.025

#   vx_samples: 20
#   vy_samples: 1
#   vth_samples: 40
#   controller_frequency: 5.0

#   # Compared with the original settings, reduce path-locking and greatly
#   # increase obstacle cost so DWA is willing to leave the global path.
#   path_distance_bias: 24.0
#   goal_distance_bias: 12.0
#   occdist_scale: 0.15

#   forward_point_distance: 0.60
#   stop_time_buffer: 0.80

#   scaling_speed: 0.35
#   max_scaling_factor: 0.20

#   oscillation_reset_dist: 0.30
#   oscillation_reset_angle: 0.40
#   twirling_scale: 0.0

#   publish_traj_pc: true
#   publish_cost_grid_pc: true

DWAPlannerROS:
  odom_topic: /one_x/odom

  max_vel_x: 1
  min_vel_x: 0.00
  max_vel_y: 0.00
  min_vel_y: 0.00

  max_vel_trans: 1
  min_vel_trans: 0.00

  max_vel_theta: 0.30
  min_vel_theta: 0.00

  acc_lim_x: 1.00
  acc_lim_y: 0.00
  acc_lim_theta: 1.20

  xy_goal_tolerance: 0.30
  yaw_goal_tolerance: 3.14
  latch_xy_goal_tolerance: true

  controller_frequency: 3.0

  sim_time: 3.0
  sim_granularity: 0.05
  angular_sim_granularity: 0.025

  vx_samples: 15
  vy_samples: 1
  vth_samples: 50

  # 降低对全局路径的强制贴合
  path_distance_bias: 8.0

  # 保持向目标前进的趋势
  goal_distance_bias: 12.0

  # 明显提高对障碍代价的敏感度
  occdist_scale: 0.60

  forward_point_distance: 0.30
  stop_time_buffer: 1.00

  scaling_speed: 0.20
  max_scaling_factor: 0.20

  oscillation_reset_dist: 0.20
  oscillation_reset_angle: 0.30
  twirling_scale: 0.0

  publish_traj_pc: true
  publish_cost_grid_pc: true
