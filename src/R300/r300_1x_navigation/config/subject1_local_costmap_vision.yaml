local_costmap:
  global_frame: odom
  robot_base_frame: base_link

  update_frequency: 10.0
  publish_frequency: 3.0
  transform_tolerance: 0.5
  always_send_full_costmap: false

  static_map: false
  rolling_window: true
  width: 24.0
  height: 24.0
  resolution: 0.10

  plugins:
    - {name: vision_snapshot_layer,
       type: "r300_1x_navigation/VisionSnapshotLayer"}
    - {name: inflation_layer,
       type: "costmap_2d::InflationLayer"}

  vision_snapshot_layer:
    enabled: true
    topic: /r300_vision/obstacle_scan

    # 每个独立障碍自最后一次匹配观测起保持5秒。
    hold_time_s: 5.0

    # 保持逻辑由每个障碍自己的TTL负责，不因短时断流提前清空。
    expected_update_rate_s: 0.0
    stop_on_stale: false

    max_message_age_s: 0.5
    transform_timeout_s: 0.10

    min_range_m: 0.20
    max_range_m: 10.0
    dedup_resolution_m: 0.05

    # 同一帧中，距离小于该值的几何点聚为同一个障碍。
    cluster_tolerance_m: 0.45

    # 新障碍簇与旧轨迹质心距离小于该值时，认为是同一个障碍：
    # 只更新该障碍，不删除其他仍在TTL内的障碍。
    association_distance_m: 0.50

    # 远处小障碍可能只有少数扫描束，先保留1。
    min_cluster_points: 1

    publish_active_scan: true
    active_scan_topic: /r300_vision/active_obstacle_scan
    active_scan_frame: base_link
    active_scan_angle_increment_deg: 0.50

  inflation_layer:
    enabled: true
    inflation_radius: 0.65
    cost_scaling_factor: 3.0
